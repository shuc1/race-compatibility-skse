name: Race Compatibility SKSE CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    runs-on: windows-2025-vs2026
    outputs:
      version: ${{ steps.extract_version.outputs.version }}
      tag: ${{ steps.extract_version.outputs.tag }}
      matrix: ${{ steps.pack.outputs.matrix }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Extract Version
        id: extract_version
        run: |
          . .github/scripts/match-string.ps1

          $content = Get-Content xmake.lua -Raw -Encoding UTF8
          $version = Match-String -content $content -pattern 'set_version\("([^"]+)"'
          $tag = "v$version"

          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "tag=$tag" >> $env:GITHUB_OUTPUT

          echo "📘 Version: $version"

      - name: Check if Tag Exists
        run: |
          $ErrorActionPreference = "Continue"
          git fetch --tags 2>$null
          $tag = "${{ steps.extract_version.outputs.tag }}"
          git rev-parse $tag -- 2>$null
          $ErrorActionPreference = "Stop"

          if ($LASTEXITCODE -eq 0) {
            echo "❌ Tag already exists: $tag"
            exit 1
          } else {
            echo "🏷️ Tag does not exist: $tag"
            exit 0
          }

      - name: Setup Xmake
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          # ref: https://github.com/xmake-io/xmake/blob/dev/.github/workflows/windows.yml
          xmake-version: latest
          actions-cache-folder: ".xmake-cache"
          actions-cache-key: ${{ runner.os }}

      - name: Build
        run: |
          xmake f -v -y -m release
          xmake -vD -y -g default
          xmake f -v -y -m releasedbg
          xmake -vD -y

      - name: Pack and Extract Matrix for Publishing
        id: pack
        run: |
          $output = xmake pack 2>&1
          $packageList = @()
          foreach ($line in ($output -split '\r?\n')) {
              if ($line -match '\[package\]:\s*(.*)') {
                  $jsonStr = $matches[1].Trim()
                  $packageList += ConvertFrom-Json $jsonStr
              }
          }

          if ($packageList.Count -eq 0) {
              Write-Error "❗ No packages found! Aborting workflow."
              exit 1
          }

          $matrixObject = @{ include = @($packageList) }
          $matrixJson = $matrixObject | ConvertTo-Json -Compress

          echo "matrix=$matrixJson" >> $env:GITHUB_OUTPUT
          echo "🗃️ Packed artifacts"
          echo "📊 Matrix: $matrixJson"

      - name: Upload Artifacts
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v7
        with:
          name: artifact-${{ steps.extract_version.outputs.version }}
          path: build/xpack/*.zip
          if-no-files-found: error

  release:
    if: github.event_name == 'push'
    permissions:
      contents: write
      pull-requests: read
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create Git Tag
        run: |
          tag=${{ needs.build.outputs.tag }}
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git tag -a "${tag}" HEAD -m "Release ${tag}"
          git push origin "${tag}" || (echo "Failed to push tag"; exit 1)

      - name: Generate Changelog
        run: |
          url="https://github.com/${{ github.repository }}"
          prev_tag=$(git describe --tags --abbrev=0 --match "v*.*.*" $(git rev-list --tags --skip=1 --max-count=1))
          echo "prev_tag=$prev_tag" >> $GITHUB_OUTPUT
          {
            echo "## What's Changed"
            echo "* release: version ${{ needs.build.outputs.version }} by @${GITHUB_ACTOR}"
            echo
            echo
            echo "**Full Changelog**: ${url}/compare/${prev_tag}...${{ needs.build.outputs.tag }}"
          } > CHANGELOG.md

      - name: Download Artifacts
        uses: actions/download-artifact@v8
        with:
          name: artifact-${{ needs.build.outputs.version }}
          path: artifact

      - name: List Downloaded Files
        run: |
          echo "💼 Artifacts:"
          find artifact -type f -name "*.zip" -print -exec sha256sum {} \;

      - name: Create GitHub Release and Upload Assets
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ needs.build.outputs.tag }}
          name: ${{ needs.build.outputs.tag }}
          body_path: CHANGELOG.md
          files: artifact/**/*.zip

  publish:
    if: github.event_name == 'push'
    needs:
      - build
      - release
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 1
      matrix: ${{ fromJson(needs.build.outputs.matrix) }}
      fail-fast: false
    steps:
      - name: Download Asset from Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ needs.build.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --pattern "${{ matrix.filename }}" \
            --dir ./

      - name: Publish to Nexus Mods
        id: publish_nexusmods
        uses: Nexus-Mods/upload-action@v1.0.0-beta.3
        with:
          api_key: ${{ secrets.NEXUSMODS_API_KEY }}
          file_group_id: ${{ matrix.group_id }}
          filename: ${{ matrix.filename }}
          display_name: ${{ matrix.name }}
          version: ${{ needs.build.outputs.version }}
          file_category: ${{ matrix.category }}
          description: ${{ matrix.description }}

      - name: List Uploaded Files
        shell: bash
        run: |
          echo "✅ Uploaded ${{ matrix.filename }} to Nexus Mods"
          echo "📑 File UID: ${{ steps.publish_nexusmods.outputs.file_uid }}"
          echo "📂 Group ID: ${{ matrix.group_id }}"
          echo " SHA256: $(sha256sum "${{ matrix.filename }}" | awk '{print $1}')"
