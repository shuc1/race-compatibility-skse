name: Publish Race Compatibility SKSE

on:
  release:
    types: [published]

jobs:
  prepare:
    runs-on: windows-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      matrix: ${{ steps.set_matrix.outputs.matrix }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Get Version from Release Tag
        id: get_version
        run: |
          $tag = "${{ github.event.release.tag_name }}"
          $version = $tag.TrimStart('vV')
          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "📘 Version from Release Tag: $version"

      - name: Setup xmake
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          # ref: https://github.com/xmake-io/xmake/blob/dev/.github/workflows/windows.yml
          xmake-version: latest
          actions-cache-folder: ".xmake-cache"
          actions-cache-key: ${{ runner.os }}

      - name: Pack and Extract Matrix
        id: set_matrix
        run: |
          # rerun xmake pack to get the package info
          $output = xmake pack 2>&1
          $packageList = @()
          foreach ($line in ($output -split '\r?\n')) {
              if ($line -match '\[package\]:\s*(.*)') {
                  $jsonStr = $matches[1].Trim()
                  $packageList += ConvertFrom-Json $jsonStr
              }
          }

          if ($packageList.Count -eq 0) {
              Write-Error "❗ No packages found! Aborting workflow."
              exit 1
          }

          $matrixObject = @{ include = @($packageList) }
          $matrixJson = $matrixObject | ConvertTo-Json -Compress

          echo "matrix=$matrixJson" >> $env:GITHUB_OUTPUT
          echo "📊 Matrix: $matrixJson"

  publish:
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}

    steps:
      - name: Download Asset from Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p downloads
          gh release download "${{ github.event.release.tag_name }}" \
            --repo "${{ github.repository }}" \
            --pattern "${{ matrix.filename }}" \
            --dir ./downloads

      - name: List Downloaded Assets
        run: |
          echo "💼 Release Assets:"
          for file in downloads/*.zip; do
            sha256sum "$file"
          done

      - name: Publish to Nexus Mods
        id: publish_nexusmods
        uses: Nexus-Mods/upload-action@v1.0.0-beta.3
        with:
          api_key: ${{ secrets.NEXUSMODS_API_KEY }}
          file_group_id: ${{ matrix.group_id }}
          filename: ./downloads/${{ matrix.filename }}
          display_name: ${{ matrix.name }}
          version: ${{ needs.prepare.outputs.version }}
          file_category: ${{ matrix.category }}
          description: ${{ matrix.description }}

      - name: Show uploaded file info
        shell: bash
        run: |
          echo "✅ Uploaded ${{ matrix.filename }} to Nexus Mods"
          echo "📑 File UID: ${{ steps.publish_nexusmods.outputs.file_uid }}"
          echo "📂 Group ID: ${{ matrix.group_id }}"
          echo " SHA256: $(sha256sum "./downloads/${{ matrix.filename }}" | awk '{print $1}')"
